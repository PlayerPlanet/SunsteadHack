# Local parity for the deployment-grade control plane: Postgres + a one-shot migrate
# step + the web tier + the worker tier, wired exactly like the AWS deployment (web
# enqueues, worker claims). Auth runs in INSECURE dev mode here (no IdP locally); in
# AWS the web tier gets OAUTH_* instead of CLEANROOM_ALLOW_INSECURE — see docs/deploy-aws.md.
#
#   docker compose up --build
#   curl localhost:8000/healthz
#
# NOTE: local creds are deliberately throwaway. Never reuse them anywhere real.

x-app-dsn: &app_dsn "postgresql://sunstead_app:devpass@postgres:5432/cleanroom"
x-admin-dsn: &admin_dsn "postgresql://postgres:devpass@postgres:5432/cleanroom"

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: cleanroom
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cleanroom"]
      interval: 2s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:17
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./cleanroom/db/schema.sql:/sql/schema.sql:ro
      - ./sql/roles.sql:/sql/roles.sql:ro
    entrypoint: ["bash", "-c"]
    command:
      - >
        psql "$$ADMIN_DSN" -v ON_ERROR_STOP=1 -f /sql/schema.sql &&
        psql "$$ADMIN_DSN" -v ON_ERROR_STOP=1 -v app_password=devpass -f /sql/roles.sql
    environment:
      ADMIN_DSN: *admin_dsn

  web:
    build: .
    depends_on:
      migrate: { condition: service_completed_successfully }
    command: ["python", "-m", "cleanroom.control.server.http"]
    environment:
      CLEANROOM_PG_APP_DSN: *app_dsn      # serve as the non-superuser app login
      CLEANROOM_DISPATCH_MODE: queue       # enqueue; the worker runs the loop
      CLEANROOM_ALLOW_INSECURE: "1"        # DEV ONLY: disables OAuth. AWS sets OAUTH_* instead.
      PORT: "8000"
    ports:
      - "8000:8000"

  worker:
    build: .
    depends_on:
      migrate: { condition: service_completed_successfully }
    command: ["python", "-m", "cleanroom.control.worker"]
    environment:
      # The worker writes experiments; in AWS point it at the proposer-role login.
      CLEANROOM_PG_APP_DSN: *app_dsn
      CLEANROOM_WORKER_POLL_SECONDS: "1.0"
