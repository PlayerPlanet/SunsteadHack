name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + extras (server, dev, proposer)
        # proposer brings `anthropic`, which the offline proposer tests import; without
        # it they ModuleNotFoundError instead of asserting the expected ValueError.
        run: pip install ".[server,dev,proposer]"
      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: python -m pytest -q
