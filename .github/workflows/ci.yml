name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + extras (server, dev, proposer)
        # proposer brings `anthropic`, which the offline proposer tests import; without
        # it they ModuleNotFoundError instead of asserting the expected ValueError.
        run: pip install ".[server,dev,proposer]"
      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: python -m pytest -q

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check (advisory)
        continue-on-error: true
        run: terraform fmt -check -recursive
      - name: Validate (no backend/credentials needed)
        run: |
          terraform init -backend=false
          terraform validate

  docker-build:
    # Proves the image builds; does not push (push happens in deploy.yml on main).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t sunstead-control:ci .
