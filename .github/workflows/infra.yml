name: infra

# Infrastructure changes (VPC/ALB/ECS/Cognito/Secrets) — MANUAL only. Run from the
# Actions tab; choose plan (default, safe) or apply. Kept separate from deploy.yml so a
# code merge can never silently mutate infrastructure. Requires a remote tf backend
# (configure backend.tf / -backend-config) for shared state — local state won't persist
# between runs.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "terraform action"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  # tf variables sourced from repo secrets/vars (see docs/deploy-aws.md).
  TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
  TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
  TF_VAR_container_image: ${{ vars.CONTAINER_IMAGE }}
  TF_VAR_app_dsn_secret_value: ${{ secrets.APP_DSN }}
  TF_VAR_github_repo: ${{ github.repository }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - name: Plan
        run: terraform plan -out tfplan
      - name: Apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -auto-approve tfplan
